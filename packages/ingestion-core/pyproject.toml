[project]
name = "ingestion-core"
version = "0.1.0"
description = "Data ingestion pipeline: source adapters, normalization, entity extraction, graph mutation planning"
requires-python = ">=3.10"
dependencies = [
    "graph-core",
    "entity-resolution",
    "evidence-core",
    "pydantic>=2.10",
    "openai>=1.58",
    "tenacity>=9.0",
    "phonenumbers>=8.13",
    "email-validator>=2.2",
    "pycountry>=24.6",
    "python-dateutil>=2.9",
    "rapidfuzz>=3.10",
]

[project.optional-dependencies]
extraction = [
    "openai>=1.58",
    "tenacity>=9.0",
]
# File parsers (disabled in text-only mode). Reinstall with
# `pip install -e "packages/ingestion-core[files]"` when re-enabling uploads.
files = [
    "PyMuPDF>=1.25",
    "python-docx>=1.1",
    "pytesseract>=0.3",
    "Pillow>=11.0",
    "pandas>=2.2",
]

[tool.uv.sources]
graph-core = { workspace = true }
entity-resolution = { workspace = true }
evidence-core = { workspace = true }

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
