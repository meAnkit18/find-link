[project]
name = "agent-tools"
version = "0.1.0"
description = "Framework-agnostic graph tools for AI agents — search, expand, risk, ingestion"
requires-python = ">=3.10"
dependencies = [
    "graph-core",
    "risk-engine",
    "ingestion-core",
]

[tool.uv.sources]
graph-core = { workspace = true }
risk-engine = { workspace = true }
ingestion-core = { workspace = true }

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
