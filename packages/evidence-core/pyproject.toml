[project]
name = "evidence-core"
version = "0.1.0"
description = "Provenance and traceability: evidence records, citations, source tracking for graph entities"
requires-python = ">=3.10"
dependencies = [
    "graph-core",
    "sqlalchemy>=2.0",
    "rapidfuzz>=3.0",
]

[tool.uv.sources]
graph-core = { workspace = true }

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
