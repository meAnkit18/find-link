# Workspace root — not an installable package.
# Members are defined below; shared lint config lives here.

[tool.uv.workspace]
members = [
    "packages/graph-core",
    "packages/intelligence-schema",
    "packages/evidence-core",
    "packages/ingestion-core",
    "packages/entity-resolution",
    "packages/risk-engine",
    "packages/agent-tools",
    "packages/reasoning-core",
    "apps/api",
    "apps/worker",
]

[dependency-groups]
dev = [
    "ruff>=0.6",
    "mypy>=1.10",
]

[tool.ruff]
line-length = 100
target-version = "py310"
src = [
    "packages/graph-core/src",
    "packages/intelligence-schema/src",
    "packages/evidence-core/src",
    "packages/ingestion-core/src",
    "packages/entity-resolution/src",
    "packages/risk-engine/src",
    "packages/agent-tools/src",
    "packages/reasoning-core/src",
    "apps/api/src",
    "apps/worker/src",
]
extend-exclude = ["apps/web"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort (import sorting)
    "UP",  # pyupgrade
    "B",   # bugbear
]

[tool.mypy]
python_version = "3.10"
ignore_missing_imports = true
