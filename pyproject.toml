# Workspace root — not an installable package.
# Members are defined below; shared lint config lives here.

[tool.uv.workspace]
members = ["packages/graph-core", "apps/api"]

[dependency-groups]
dev = [
    "ruff>=0.6",
    "mypy>=1.10",
]

[tool.ruff]
line-length = 100
target-version = "py310"
src = ["packages/graph-core/src", "apps/api/src"]
extend-exclude = ["apps/web"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort (import sorting)
    "UP",  # pyupgrade
    "B",   # bugbear
]

[tool.mypy]
python_version = "3.10"
ignore_missing_imports = true
