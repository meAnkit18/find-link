# Single-node NebulaGraph cluster for local development and integration
# testing (see tests/integration/conftest.py, which uses NEBULA_TEST_HOST).
#
# Usage:
#   docker compose up -d
#   NEBULA_TEST_HOST=127.0.0.1 pytest tests/integration -v
#   docker compose down -v   # tear down and wipe data

services:
  metad0:
    image: vesoft/nebula-metad:v3.6.0
    command:
      - --meta_server_addrs=metad0:9559
      - --local_ip=metad0
      - --ws_ip=metad0
      - --port=9559
      - --ws_http_port=19559
      - --data_path=/data/meta
      - --log_dir=/logs
      - --v=0
    volumes:
      - nebula-meta-data:/data/meta
      - nebula-meta-logs:/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:19559/status"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: on-failure

  storaged0:
    image: vesoft/nebula-storaged:v3.6.0
    command:
      - --meta_server_addrs=metad0:9559
      - --local_ip=storaged0
      - --ws_ip=storaged0
      - --port=9779
      - --ws_http_port=19779
      - --data_path=/data/storage
      - --log_dir=/logs
      - --v=0
    depends_on:
      metad0:
        condition: service_healthy
    volumes:
      - nebula-storage-data:/data/storage
      - nebula-storage-logs:/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:19779/status"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: on-failure

  graphd:
    image: vesoft/nebula-graphd:v3.6.0
    command:
      - --meta_server_addrs=metad0:9559
      - --local_ip=graphd
      - --ws_ip=graphd
      - --port=9669
      - --ws_http_port=19669
      - --log_dir=/logs
      - --v=0
    depends_on:
      storaged0:
        condition: service_healthy
    ports:
      - "9669:9669"
    volumes:
      - nebula-graph-logs:/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:19669/status"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: on-failure

  # One-shot job: registers storaged0 with the meta service. Required once
  # per fresh cluster before any space can be created. Exits after running.
  console:
    image: vesoft/nebula-console:v3.6.0
    entrypoint: ["sh", "-c"]
    command:
      - "sleep 5 && nebula-console -addr graphd -port 9669 -u root -p nebula -e 'ADD HOSTS \"storaged0\":9779;'"
    depends_on:
      graphd:
        condition: service_healthy

volumes:
  nebula-meta-data:
  nebula-meta-logs:
  nebula-storage-data:
  nebula-storage-logs:
  nebula-graph-logs:
